<!DOCTYPE html> 
<html> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Tic-Tac-Toe Spiel</title> 
    <link rel="stylesheet" href="style.css">
</head> 
<body> 
    <h1>Tic-Tac-Toe 🕹️</h1> 
    <p>Schön, dass ihr da seid! Das ist mein allererstes Web-Projekt.</p>
    <p>Die Regeln kennt jeder: 2 Spieler, abwechselnd klicken, 3 in einer Reihe gewinnt.</p>
    <p>Let's go! 🎮</p>

    <div id="status">Spieler X ist dran</div>

    <div id="spielfeld">
        <button class="feld" id="feld-0"></button>
        <button class="feld" id="feld-1"></button>
        <button class="feld" id="feld-2"></button>
        <button class="feld" id="feld-3"></button>
        <button class="feld" id="feld-4"></button>
        <button class="feld" id="feld-5"></button>
        <button class="feld" id="feld-6"></button>
        <button class="feld" id="feld-7"></button>
        <button class="feld" id="feld-8"></button>
    </div>

    <button id="neustart">Neustart</button>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>

    <script type="module" src="script.js"></script>
</body> 
</html>
